<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Support FAQ Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Quick links</h2>
            </div>
            <div class="faq-topics">
                <button class="topic-btn" data-topic="password">Password Issues</button>
                <button class="topic-btn" data-topic="crash">App Crashing</button>
                <button class="topic-btn" data-topic="security">Security</button>
                <button class="topic-btn" data-topic="settings">Settings</button>
                <button class="topic-btn" data-topic="support">Support</button>
            </div>
            <div class="sidebar-footer">
                <p class="info-text">Ask any question about our tech support</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chatbot-container">
            <!-- Header -->
            <header class="chat-header">
                <div class="header-content">
                    <h1>Tech Support Assistant</h1>
                    <p>Powered by spaCy NLP</p>
                </div>
                <button class="clear-btn" id="clearBtn" title="Clear chat history">🗑️</button>
            </header>

            <!-- Messages Area -->
            <div class="messages-container" id="messagesContainer">
                <div class="message bot-message welcome-message">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <p><strong>Welcome to Tech Support!</strong></p>
                        <p>I'm here to help answer your questions about our software. Just ask me anything about account management, security, troubleshooting, or features.</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <form class="chat-form" id="chatForm">
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="userInput"
                            class="chat-input"
                            placeholder="Ask me anything... e.g., 'How do I reset my password?'"
                            autocomplete="off"
                        />
                        <button type="submit" class="send-btn" title="Send message">
                            <span class="send-icon">📤</span>
                        </button>
                    </div>
                </form>
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <div class="dots">
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar - FAQ List -->
        <aside class="faq-panel">
            <div class="faq-panel-header">
                <h2>All FAQs</h2>
                <button class="toogle-btn" id="toogleFaqBtn" title="Collapse">-</button>
            </div>
            <div class="faq-list" id="faqList"></div>
        </aside>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
