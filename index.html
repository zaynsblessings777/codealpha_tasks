<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translation Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="theme-toggle">
        <button id="dark-mode-btn" title="Toggle dark mode">🌙</button>
    </div>

    <div class="container">
        <h1>🌍 Language Translation Tool</h1>
        <p class="subtitle">Translate text instantly in multiple languages</p>
        
        <div class="translator-box">
            <!-- Language Selection -->
            <div class="language-selector">
                <div class="selector-group">
                    <label for="source-lang">From Language:</label>
                    <select id="source-lang">
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="zh">Chinese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="ar">Arabic</option>
                        <option value="hi">Hindi</option>
                    </select>
                </div>
                
                <button id="swap-btn" class="swap-btn" title="Swap languages">⇄</button>
                
                <div class="selector-group">
                    <label for="target-lang">To Language:</label>
                    <select id="target-lang">
                        <option value="es">Spanish</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="zh">Chinese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="ar">Arabic</option>
                        <option value="hi">Hindi</option>
                    </select>
                </div>
            </div>
            
            <!-- Input Text Area -->
            <div class="input-section">
                <div class="textarea-header">
                    <label>Text to translate:</label>
                    <span class="char-count"><span id="char-input">0</span>/5000</span>
                </div>
                <textarea id="input-text" placeholder="Enter text to translate..." rows="6" maxlength="5000"></textarea>
                <button id="translate-btn" class="translate-btn">
                    <span class="btn-text">Translate</span>
                    <span class="loading-spinner" style="display: none;"></span>
                </button>
            </div>
            
            <!-- Output Text Area -->
            <div class="output-section">
                <label>Translation:</label>
                <textarea id="output-text" placeholder="Translation will appear here..." rows="6" readonly></textarea>
                <div class="output-buttons">
                    <button id="copy-btn" class="action-btn" title="Copy translation">
                        📋 <span>Copy</span>
                    </button>
                    <button id="speak-btn" class="action-btn" title="Read translation aloud">
                        🔊 <span>Speak</span>
                    </button>
                </div>
            </div>
            
            <!-- Status Message -->
            <div id="status" class="status"></div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
